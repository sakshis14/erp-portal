name: ERP DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r req.txt

      - name: Run basic test
        run: |
          python -m py_compile app.py

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "sakshicloud77" --password-stdin

      - name: Build Docker Image
        run: |
          docker build --no-cache -t sakshicloud77/erp-app:latest .

      - name: Push Docker Image
        run: |
          docker push sakshicloud77/erp-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 51.21.64.48
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker rm -f erp-portal || true
            docker rmi sakshicloud77/erp-app:latest || true
            docker pull sakshicloud77/erp-app:latest
            docker run -d -p 5000:5000 --restart always --name erp-portal sakshicloud77/erp-app:latest
            sudo systemctl restart nginx

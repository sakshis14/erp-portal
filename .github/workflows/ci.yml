name: ERP DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r req.txt

      - name: Run basic test
        run: |
          python -m py_compile app.py

      - name: Build Docker image
        run: |
          docker build -t erp-app .

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 13.60.229.246
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
           cd /home/ec2-user
           docker pull sakshicloud77/erp-app
           docker rm -f erp-app || true
           docker run -d -p 80:5000 --name erp-app sakshicloud77/erp-app

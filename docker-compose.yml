services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: erp-backend
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    restart: unless-stopped
 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped